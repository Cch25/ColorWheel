<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Color Picker</title>

<style>
:root{
  --bg:#111418;
  --card:#1b2127;
  --text:#ffffff;
  --muted:rgba(255,255,255,.55);
  --outline:rgba(255,255,255,.12);
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:var(--bg);
  min-height:100svh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color:var(--text);
  padding:22px;
  overflow: hidden; /* prevent micro-scroll during slider drag */
}

 

.wheelWrap{
  display:flex;
  justify-content:center;
  margin:6px 0 16px;
}

canvas{
  width:min(82vw, 420px);
  height:min(82vw, 420px);
  border-radius:50%;
  cursor:crosshair;
  touch-action:none;
  display:block;
}

/* ── shared result swatch ── */
.resultSwatch{
  width:100%;
  height:64px;
  border-radius:12px;
  border:1.5px solid var(--outline);
  margin-bottom:18px;
  transition: background 0.08s linear;
}

/* ── sliders ── */
.sliderBlock{
  margin: 0 0 14px;
}

.sliderLabel{
  font-size:12px;
  color:var(--muted);
  letter-spacing:.5px;
  text-transform:uppercase;
  margin-bottom:8px;
  padding-left:2px;
}

.slider{
  width:100%;
  appearance:none;
  height:16px;
  border-radius:999px;
  outline:none;
  cursor:pointer;
  background:black;
  touch-action: none; /* prevent page shift while dragging sliders on mobile */
}

.slider::-webkit-slider-thumb{
  appearance:none;
  width:30px;
  height:30px;
  border-radius:50%;
  background:white;
  border:3px solid #111;
  cursor:pointer;
}

.values{
  margin-top:6px;
  text-align:center;
  font-size:14px;
  color:var(--muted);
  min-height:18px;
}
</style>
</head>

<body>

<div >

  <div class="wheelWrap">
    <canvas id="wheel"></canvas>
  </div>

  <!-- Single shared result swatch -->
  <div class="resultSwatch" id="resultSwatch"></div>

  <!-- Shade Slider -->
  <div class="sliderBlock">
    <div class="sliderLabel">Shade</div>
    <input type="range" id="shadeSlider" class="slider" min="-50" max="50" value="0">
  </div>

  <!-- Saturation Slider -->
  <div class="sliderBlock">
    <div class="sliderLabel">Saturation</div>
    <input type="range" id="satSlider" class="slider" min="0" max="100" value="100">
  </div>

  <div class="values" id="values">Click or drag</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const canvas       = document.getElementById("wheel");
  const ctx          = canvas.getContext("2d");
  const values       = document.getElementById("values");
  const shadeSlider  = document.getElementById("shadeSlider");
  const satSlider    = document.getElementById("satSlider");
  const resultSwatch = document.getElementById("resultSwatch");

  let dragging = false;
  let baseColor = { r: 255, g: 0, b: 0 };
  let selector  = { x: 0, y: 0 };
  let currentHue        = 0;
  let currentSaturation = 1;

  const wheelCanvas = document.createElement("canvas");
  const wheelCtx    = wheelCanvas.getContext("2d", { willReadFrequently: true });

  function setCanvasResolution() {
    const cssSize = Math.min(window.innerWidth * 0.82, 420);
    const dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));
    canvas.style.width  = cssSize + "px";
    canvas.style.height = cssSize + "px";
    canvas.width  = Math.round(cssSize * dpr);
    canvas.height = Math.round(cssSize * dpr);
  }

  function hsvToRgb(h, s, v) {
    const c  = v * s;
    const hp = h / 60;
    const x  = c * (1 - Math.abs((hp % 2) - 1));
    let r1=0, g1=0, b1=0;
    if      (0<=hp&&hp<1) [r1,g1,b1]=[c,x,0];
    else if (1<=hp&&hp<2) [r1,g1,b1]=[x,c,0];
    else if (2<=hp&&hp<3) [r1,g1,b1]=[0,c,x];
    else if (3<=hp&&hp<4) [r1,g1,b1]=[0,x,c];
    else if (4<=hp&&hp<5) [r1,g1,b1]=[x,0,c];
    else if (5<=hp&&hp<6) [r1,g1,b1]=[c,0,x];
    const m = v - c;
    return [
      Math.round((r1+m)*255),
      Math.round((g1+m)*255),
      Math.round((b1+m)*255)
    ];
  }

  function adjustShade(color, amount) {
    let {r, g, b} = color;
    if (amount < 0) {
      const f = 1 + (amount / 50);
      r*=f; g*=f; b*=f;
    } else {
      r += (255-r)*(amount/50);
      g += (255-g)*(amount/50);
      b += (255-b)*(amount/50);
    }
    return { r:Math.round(r), g:Math.round(g), b:Math.round(b) };
  }

  function rgbToHex(r, g, b) {
    return "#" + [r,g,b].map(x => x.toString(16).padStart(2,"0")).join("");
  }

  function drawWheel(size) {
    wheelCanvas.width  = size;
    wheelCanvas.height = size;
    const radius = size / 2;
    const image  = wheelCtx.createImageData(size, size);
    const data   = image.data;
    for (let y=0; y<size; y++) {
      for (let x=0; x<size; x++) {
        const dx   = x - radius;
        const dy   = y - radius;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist <= radius) {
          const angle = Math.atan2(dy, dx);
          const hue   = ((angle*180/Math.PI) + 90 + 360) % 360;
          const s     = dist / radius;
          const rgb   = hsvToRgb(hue, s, 1);
          const i     = (y*size + x) * 4;
          data[i]   = rgb[0];
          data[i+1] = rgb[1];
          data[i+2] = rgb[2];
          data[i+3] = 255;
        }
      }
    }
    wheelCtx.putImageData(image, 0, 0);
  }

  function updateSatSliderGradient() {
    const fullRgb = hsvToRgb(currentHue, 1, 1);
    satSlider.style.background =
      `linear-gradient(to right,
        rgb(128,128,128) 0%,
        rgb(${fullRgb[0]},${fullRgb[1]},${fullRgb[2]}) 100%)`;
  }

  function updateShadeSliderGradient() {
    shadeSlider.style.background =
      `linear-gradient(to right,
        black 0%,
        rgb(${baseColor.r},${baseColor.g},${baseColor.b}) 50%,
        white 100%)`;
  }

  function hueSatToCanvasPos(hue, sat, size) {
    const radius = size / 2;
    const angle  = (hue - 90) * Math.PI / 180;
    const dist   = sat * radius;
    return {
      x: radius + Math.cos(angle) * dist,
      y: radius + Math.sin(angle) * dist
    };
  }

  function updateUI() {
    const shaded = adjustShade(baseColor, parseInt(shadeSlider.value));
    const hex    = rgbToHex(shaded.r, shaded.g, shaded.b);

    resultSwatch.style.background = hex;
    values.textContent = `HEX: ${hex}  |  RGB: (${shaded.r}, ${shaded.g}, ${shaded.b})`;

    updateShadeSliderGradient();
    updateSatSliderGradient();
  }

  function render(size) {
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(wheelCanvas, 0, 0);

    ctx.beginPath();
    ctx.arc(selector.x, selector.y, 32, 0, Math.PI * 2);
    ctx.lineWidth   = 6;
    ctx.strokeStyle = "white";
    ctx.stroke();

    updateUI();
  }

  function posToHue(x, y, size) {
    const radius = size / 2;
    const angle  = Math.atan2(y - radius, x - radius);
    return ((angle * 180 / Math.PI) + 90 + 360) % 360;
  }

  function posToSat(x, y, size) {
    const radius = size / 2;
    const dx = x - radius, dy = y - radius;
    return Math.min(1, Math.sqrt(dx*dx + dy*dy) / radius);
  }

  function pickFromPosition(x, y, size) {
    currentHue        = posToHue(x, y, size);
    currentSaturation = posToSat(x, y, size);
    satSlider.value   = Math.round(currentSaturation * 100);
    const cx = Math.max(0, Math.min(size-1, Math.round(x)));
    const cy = Math.max(0, Math.min(size-1, Math.round(y)));
    const p  = wheelCtx.getImageData(cx, cy, 1, 1).data;
    baseColor = { r: p[0], g: p[1], b: p[2] };
  }

  function applySaturation(size) {
    currentSaturation = parseInt(satSlider.value) / 100;
    const pos = hueSatToCanvasPos(currentHue, currentSaturation, size);
    selector  = pos;
    const cx  = Math.max(0, Math.min(size-1, Math.round(pos.x)));
    const cy  = Math.max(0, Math.min(size-1, Math.round(pos.y)));
    const p   = wheelCtx.getImageData(cx, cy, 1, 1).data;
    baseColor = { r: p[0], g: p[1], b: p[2] };
  }

  function init() {
    setCanvasResolution();
    const size = canvas.width;
    drawWheel(size);

    currentHue        = 239;
    currentSaturation = 0.85;
    satSlider.value   = 85;
    shadeSlider.value = 0;
    selector          = hueSatToCanvasPos(currentHue, currentSaturation, size);
    const cx0         = Math.max(0, Math.min(size-1, Math.round(selector.x)));
    const cy0         = Math.max(0, Math.min(size-1, Math.round(selector.y)));
    const pixel       = wheelCtx.getImageData(cx0, cy0, 1, 1).data;
    baseColor         = { r: pixel[0], g: pixel[1], b: pixel[2] };

    render(size);

    canvas.onpointerdown = e => {
      dragging = true;
      const rect  = canvas.getBoundingClientRect();
      const scale = size / rect.width;
      const x = (e.clientX - rect.left) * scale;
      const y = (e.clientY - rect.top)  * scale;
      selector = { x, y };
      pickFromPosition(x, y, size);
      render(size);
    };

    canvas.onpointermove = e => {
      if (!dragging) return;
      const rect  = canvas.getBoundingClientRect();
      const scale = size / rect.width;
      const x = (e.clientX - rect.left) * scale;
      const y = (e.clientY - rect.top)  * scale;
      selector = { x, y };
      pickFromPosition(x, y, size);
      render(size);
    };

    canvas.onpointerup = () => dragging = false;

    shadeSlider.oninput = () => render(size);
    satSlider.oninput   = () => { applySaturation(size); render(size); };

    window.onresize = init;
  }

  init();
});
</script>

</body>
</html>
