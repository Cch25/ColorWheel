<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color Picker With Shade Slider</title>

<style>
body{
  margin:0;
  background:#1e1e1e;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  font-family:Arial;
  color:white;
}

canvas{
  border-radius:50%;
  cursor:crosshair;
}

.panel{
  margin-top:20px;
  text-align:center;
  width:380px;
}

.preview{
  width:100px;
  height:100px;
  margin:15px auto;
  border-radius:18px;
  border:2px solid white;
}

.values{
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
}

.slider{
  width:100%;
  margin-top:12px;
  appearance:none;
  height:12px;
  border-radius:10px;
  outline:none;
  cursor:pointer;
}

.slider::-webkit-slider-thumb{
  appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:white;
  border:2px solid black;
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="wheel" width="500" height="500"></canvas>

<div class="panel">
  <div class="preview" id="preview"></div>
  <input type="range" id="shadeSlider" class="slider" min="-50" max="50" value="0">
  <div class="values" id="values">Click or drag</div>
</div>

<script>
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const preview=document.getElementById("preview");
const values=document.getElementById("values");
const slider=document.getElementById("shadeSlider");

const size=canvas.width;
const radius=size/2;
const centerX=radius;
const centerY=radius;

let selector={x:centerX,y:centerY};
let dragging=false;

let baseColor={r:255,g:0,b:0}; // original picked color

// Draw static wheel (HSL 50% lightness)
function drawWheel(){
  const image=ctx.createImageData(size,size);
  const data=image.data;

  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      const dx=x-centerX;
      const dy=y-centerY;
      const dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<=radius){
        const angle=Math.atan2(dy,dx);
        const hue=(angle*180/Math.PI+360)%360;
        const sat=(dist/radius)*100;
        const rgb=hslToRgb(hue,sat,50);

        const i=(y*size+x)*4;
        data[i]=rgb[0];
        data[i+1]=rgb[1];
        data[i+2]=rgb[2];
        data[i+3]=255;
      }
    }
  }

  ctx.putImageData(image,0,0);
}

// HSL → RGB
function hslToRgb(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return [
    Math.round(255*f(0)),
    Math.round(255*f(8)),
    Math.round(255*f(4))
  ];
}

// Shade adjustment (darken/lighten)
function adjustShade(color,amount){
  let r=color.r;
  let g=color.g;
  let b=color.b;

  if(amount<0){
    const factor=1+(amount/50);
    r*=factor;
    g*=factor;
    b*=factor;
  }else{
    r+=(255-r)*(amount/50);
    g+=(255-g)*(amount/50);
    b+=(255-b)*(amount/50);
  }

  return {
    r:Math.round(r),
    g:Math.round(g),
    b:Math.round(b)
  };
}

function rgbToHex(r,g,b){
  return "#"+[r,g,b].map(x=>
    x.toString(16).padStart(2,"0")
  ).join("");
}

function updatePreview(){
  const shaded=adjustShade(baseColor,parseInt(slider.value));
  const hex=rgbToHex(shaded.r,shaded.g,shaded.b);

  preview.style.background=hex;
  values.textContent=`HEX: ${hex} | RGB: (${shaded.r}, ${shaded.g}, ${shaded.b})`;

  // slider gradient background
  slider.style.background=
    `linear-gradient(to right,
      black,
      rgb(${baseColor.r},${baseColor.g},${baseColor.b}),
      white)`;
}

function drawSelector(){
  ctx.beginPath();
  ctx.arc(selector.x,selector.y,8,0,Math.PI*2);
  ctx.lineWidth=3;
  ctx.strokeStyle="white";
  ctx.stroke();
}

function render(){
  drawWheel();
  drawSelector();
  updatePreview();
}

function clamp(x,y){
  const dx=x-centerX;
  const dy=y-centerY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>radius){
    const angle=Math.atan2(dy,dx);
    x=centerX+radius*Math.cos(angle);
    y=centerY+radius*Math.sin(angle);
  }
  return {x,y};
}

canvas.addEventListener("mousedown",e=>{
  dragging=true;
  move(e);
});
canvas.addEventListener("mousemove",e=>{
  if(dragging) move(e);
});
canvas.addEventListener("mouseup",()=>dragging=false);
canvas.addEventListener("mouseleave",()=>dragging=false);

function move(e){
  const rect=canvas.getBoundingClientRect();
  const pos=clamp(e.clientX-rect.left,e.clientY-rect.top);
  selector=pos;

  const pixel=ctx.getImageData(selector.x,selector.y,1,1).data;
  baseColor={r:pixel[0],g:pixel[1],b:pixel[2]};

  slider.value=0; // reset shade when new color picked
  render();
}

slider.addEventListener("input",updatePreview);

render();
</script>

</body>
</html>
