<!DOCTYPE html>
<html>
<head>
  <title>Advanced Color Picker</title>
  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      border-radius: 50%;
      cursor: crosshair;
    }

    .panel {
      margin-top: 20px;
      text-align: center;
    }

    .preview {
      width: 90px;
      height: 90px;
      margin: 15px auto;
      border-radius: 16px;
      border: 2px solid white;
    }

    .values {
      margin-top: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .values:hover {
      opacity: 0.8;
    }

    .hint {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<canvas id="wheel" width="500" height="500"></canvas>

<div class="panel">
  <div class="preview" id="preview"></div>
  <div class="values" id="values">Click or drag</div>
  <div class="hint">Click values to copy</div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");
const values = document.getElementById("values");

const size = canvas.width;
const radius = size / 2;
const centerX = radius;
const centerY = radius;

let selector = { x: centerX, y: centerY };
let dragging = false;

// Draw professional wheel (Hue + Saturation)
function drawWheel() {
  const image = ctx.createImageData(size, size);
  const data = image.data;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const dx = x - centerX;
      const dy = y - centerY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance <= radius) {
        const angle = Math.atan2(dy, dx);
        const hue = (angle * 180 / Math.PI + 360) % 360;
        const saturation = (distance / radius) * 100;
        const lightness = 50;

        const rgb = hslToRgb(hue, saturation, lightness);
        const index = (y * size + x) * 4;

        data[index] = rgb[0];
        data[index + 1] = rgb[1];
        data[index + 2] = rgb[2];
        data[index + 3] = 255;
      }
    }
  }

  ctx.putImageData(image, 0, 0);
}

// HSL → RGB
function hslToRgb(h, s, l) {
  s /= 100;
  l /= 100;

  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n =>
    l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));

  return [
    Math.round(255 * f(0)),
    Math.round(255 * f(8)),
    Math.round(255 * f(4))
  ];
}

function rgbToHex(r, g, b) {
  return "#" + [r, g, b].map(x =>
    x.toString(16).padStart(2, "0")
  ).join("");
}

// Auto contrast ring
function getContrastColor(r, g, b) {
  const brightness = (r * 299 + g * 587 + b * 114) / 1000;
  return brightness > 150 ? "black" : "white";
}

function drawSelector() {
  const pixel = ctx.getImageData(selector.x, selector.y, 1, 1).data;
  const [r, g, b] = pixel;

  const ringColor = getContrastColor(r, g, b);

  ctx.beginPath();
  ctx.arc(selector.x, selector.y, 10, 0, Math.PI * 2);
  ctx.lineWidth = 3;
  ctx.strokeStyle = ringColor;
  ctx.stroke();
}

function updateColor() {
  const pixel = ctx.getImageData(selector.x, selector.y, 1, 1).data;
  const [r, g, b] = pixel;

  const hex = rgbToHex(r, g, b);

  preview.style.background = hex;

  const dx = selector.x - centerX;
  const dy = selector.y - centerY;
  const distance = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx);
  const hue = (angle * 180 / Math.PI + 360) % 360;
  const saturation = Math.min((distance / radius) * 100, 100);

  values.textContent =
    `HEX: ${hex} | RGB: (${r}, ${g}, ${b}) | HSL: (${Math.round(hue)}, ${Math.round(saturation)}%, 50%)`;
}

// Clamp inside circle
function clampToCircle(x, y) {
  const dx = x - centerX;
  const dy = y - centerY;
  const distance = Math.sqrt(dx * dx + dy * dy);

  if (distance > radius) {
    const angle = Math.atan2(dy, dx);
    x = centerX + radius * Math.cos(angle);
    y = centerY + radius * Math.sin(angle);
  }

  return { x, y };
}

function render() {
  drawWheel();
  updateColor();
  drawSelector();
}

canvas.addEventListener("mousedown", e => {
  dragging = true;
  handleMove(e);
});

canvas.addEventListener("mousemove", e => {
  if (dragging) handleMove(e);
});

canvas.addEventListener("mouseup", () => dragging = false);
canvas.addEventListener("mouseleave", () => dragging = false);

function handleMove(event) {
  const rect = canvas.getBoundingClientRect();
  let x = event.clientX - rect.left;
  let y = event.clientY - rect.top;

  const pos = clampToCircle(x, y);
  selector = pos;
  render();
}

// Click to copy
values.addEventListener("click", () => {
  navigator.clipboard.writeText(values.textContent);
  values.textContent = "Copied!";
  setTimeout(updateColor, 800);
});

render();
</script>

</body>
</html>
